<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 8 | AI Programming Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .app-container {
            margin-top: 100px;
            max-width: 600px;
        }
        .joke-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: #ffffff;
            transition: transform 0.3s;
        }
        .joke-card:hover {
            transform: translateY(-5px);
        }
        .badge-student {
            background-color: #6c63ff;
            color: white;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-refresh {
            background-color: #6c63ff;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            transition: 0.3s;
        }
        .btn-refresh:hover {
            background-color: #554edb;
            box-shadow: 0 5px 15px rgba(108, 99, 255, 0.4);
        }
        .footer-text {
            color: #adb5bd;
            font-size: 0.9rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container app-container">
    <div class="text-center mb-4">
        <span class="badge badge-student mb-2">Programming for AI - Lab 8</span>
        <h2 class="fw-bold">Dynamic Content Fetcher</h2>
        <p class="text-muted">A professional integration of Flask & External APIs</p>
    </div>

    <div class="card joke-card p-4">
        <div class="card-body">
            <h5 class="text-primary mb-3"># {{ joke.type | capitalize }} Joke</h5>
            
            <h4 class="card-title fw-normal mb-4" id="setup">
                "{{ joke.setup }}"
            </h4>
            
            <div class="alert alert-light border-start border-primary border-4 py-3 mb-4">
                <p class="mb-0 text-dark italic"><strong>Result:</strong> {{ joke.punchline }}</p>
            </div>

            <div class="d-grid shadow-sm">
                <button class="btn btn-refresh text-white fw-bold" onclick="location.reload()">
                    Generate New Response
                </button>
            </div>
        </div>
    </div>

    <div class="text-center footer-text">
        <p>Developed by: <strong>Rasikh Ali</strong><br>
        Department of Computer Science</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
