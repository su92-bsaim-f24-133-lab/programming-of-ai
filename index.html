<!DOCTYPE html>
<html>
<head>
    <title>University Admission Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
        }

        .chatbox {
            width: 50%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 50px;
        }

        input {
            width: 70%;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        .response {
            margin-top: 20px;
            font-size: 18px;
            color: green;
        }
    </style>
</head>

<body>

<div class="chatbox">
    <h2>🎓 University Admission Chatbot</h2>

    <input type="text" id="msg" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>

    <div class="response" id="response"></div>
</div>

<script>
function sendMessage() {
    let msg = document.getElementById("msg").value;

    fetch("/get_response", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "msg=" + msg
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("response").innerText = data.reply;
    });
}
</script>

</body>
</html>
